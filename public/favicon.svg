<!-- App mark (kit §8): pin in `primary` with a hollow WHITE cross.
     The cross is white on purpose: the red cross is a protected emblem
     (Geneva Conventions + Brazilian law), so a white cross communicates
     "health" without legal risk and gives maximum contrast. No colored
     tile/background — transparent, per kit. -->
